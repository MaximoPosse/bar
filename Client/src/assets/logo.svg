<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cáliz (chalice) icon -->
  <g transform="translate(70,25)">
    <!-- Stem -->
    <rect x="22" y="45" width="16" height="35" rx="3" fill="#8B6B3D"/>
    <!-- Base -->
    <ellipse cx="30" cy="80" rx="28" ry="8" fill="#8B6B3D"/>
    <ellipse cx="30" cy="80" rx="22" ry="5" fill="#6B4F2E"/>
    <!-- Cup -->
    <path d="M5 10 C5 35 10 40 15 45 L45 45 C50 40 55 35 55 10 Z" fill="#8B6B3D"/>
    <path d="M10 12 C10 32 14 36 18 40 L42 40 C46 36 50 32 50 12 Z" fill="#6B4F2E"/>
    <!-- Wine inside -->
    <path d="M15 28 C15 38 18 40 22 42 L38 42 C42 40 45 38 45 28 Z" fill="#5E2129" opacity="0.8"/>
    <!-- Highlight -->
    <path d="M20 15 C18 22 18 28 20 32" stroke="#F2EBE1" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  </g>
  <!-- Text "CÁLIZ" -->
  <text x="50%" y="148" text-anchor="middle" fill="#F2EBE1" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="bold" letter-spacing="6">CÁLIZ</text>
  <!-- Subtitle -->
  <text x="50%" y="170" text-anchor="middle" fill="#8B6B3D" font-family="Georgia, 'Times New Roman', serif" font-size="13" letter-spacing="4">TABERNA MEDIEVAL</text>
  <!-- Decorative line -->
  <line x1="50" y1="179" x2="150" y2="179" stroke="#8B6B3D" stroke-width="1" opacity="0.5"/>
  <text x="50%" y="190" text-anchor="middle" fill="#8B6B3D" font-family="Georgia, serif" font-size="9" letter-spacing="2">✦</text>
</svg>
